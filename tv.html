<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla TV - The Joseph Barbershop</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #d4af37; /* El dorado de tu barbería */
            --bg-color: #111111;      /* Fondo oscuro para que resalte en la TV */
            --card-bg: #1e1e1e;
            --white: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Encabezado Principal */
        header {
            background-color: var(--primary-color);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--accent-color);
        }

        header h1 {
            font-size: 3rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.8rem;
            color: var(--white);
            opacity: 0.9;
        }

        .contador-total {
            background-color: var(--accent-color);
            color: var(--primary-color);
            padding: 10px 35px;
            border-radius: 12px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* Contenedor del contenido */
        .contenido {
            display: flex;
            flex: 1;
            padding: 40px;
            gap: 40px;
            height: calc(100vh - 120px);
        }

        /* Bloque Izquierdo: Cliente Actual */
        .turno-actual {
            flex: 1.3;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--accent-color);
            text-align: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        .turno-actual h2 {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .turno-actual .nombre {
            font-size: 5.5rem;
            font-weight: bold;
            color: var(--white);
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .turno-actual .servicio {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-style: italic;
        }

        .turno-actual .hora {
            background: var(--accent-color);
            color: var(--primary-color);
            font-size: 4rem;
            font-weight: bold;
            padding: 10px 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Bloque Derecho: Siguientes Turnos */
        .proximos-turnos {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .proximos-turnos h2 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            color: var(--white);
            border-bottom: 3px solid #333;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .lista-espera {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
        }

        /* Quitar barra de scroll visualmente */
        .lista-espera::-webkit-scrollbar {
            display: none;
        }

        .item-reserva {
            background-color: #262626;
            padding: 22px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--accent-color);
            animation: slideIn 0.4s ease-out;
        }

        .item-reserva .info-cliente {
            max-width: 70%;
        }

        .item-reserva .info-nombre {
            font-size: 2.4rem;
            font-weight: bold;
            color: var(--white);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
