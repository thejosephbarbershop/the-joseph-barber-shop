<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla TV - The Joseph Barbershop</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #d4af37;
            --bg-color: #111111;
            --card-bg: #1e1e1e;
            --white: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--primary-color);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--accent-color);
        }

        header h1 {
            font-size: 3rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.8rem;
            color: var(--white);
            opacity: 0.9;
        }

        .contador-total {
            background-color: var(--accent-color);
            color: var(--primary-color);
            padding: 10px 35px;
            border-radius: 12px;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .contenido {
            display: flex;
            flex: 1;
            padding: 40px;
            gap: 40px;
            height: calc(100vh - 120px);
        }

        .turno-actual {
            flex: 1.3;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 4px solid var(--accent-color);
            text-align: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }

        .turno-actual h2 {
            font-size: 2.8rem;
            color: var(--accent-color);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .turno-actual .nombre {
            font-size: 5.5rem;
            font-weight: bold;
            color: var(--white);
            margin-bottom: 15px;
            line-height: 1.1;
        }

        .turno-actual .servicio {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-style: italic;
        }

        .turno-actual .hora {
            background: var(--accent-color);
            color: var(--primary-color);
            font-size: 4rem;
            font-weight: bold;
            padding: 10px 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .proximos-turnos {
            flex: 1;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .proximos-turnos h2 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            color: var(--white);
            border-bottom: 3px solid #333;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .lista-espera {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .lista-espera::-webkit-scrollbar {
            display: none;
        }

        .item-reserva {
            background-color: #262626;
            padding: 22px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 8px solid var(--accent-color);
            animation: slideIn 0.4s ease-out;
        }

        .item-reserva .info-cliente {
            max-width: 70%;
        }

        .item-reserva .info-nombre {
            font-size: 2.4rem;
            font-weight: bold;
            color: var(--white);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-reserva .info-servicio {
            font-size: 1.6rem;
            color: var(--text-muted);
            display: block;
            margin-top: 4px;
        }

        .item-reserva .info-hora {
            font-size: 2.4rem;
            color: var(--accent-color);
            font-weight: bold;
            background: var(--primary-color);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            font-size: 2rem;
            padding-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>The Joseph Barbershop</h1>
            <p id="fechaSubtitulo">Turnos Programados</p>
        </div>
        <div class="contador-total" id="totalTurnos">Total: 0</div>
    </header>

    <div class="contenido">
        <div class="turno-actual">
            <h2>Atendiendo Ahora</h2>
            <div class="nombre" id="actualNombre">Libre</div>
            <div class="servicio" id="actualServicio">Sin servicios agendados</div>
            <div class="hora" id="actualHora">--:--</div>
        </div>

        <div class="proximos-turnos">
            <h2>Siguientes en fila</h2>
            <div class="lista-espera" id="listaEspera">
                <div class="no-data">Cargando próximos turnos...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xnfmqumhhxpkrigizvlu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZm1xdW1oaHhwa3JpZ2l6dmx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTE3NjgsImV4cCI6MjA5NTQ4Nzc2OH0.zNSZ4Nw2Iz2IieExt9SErJddPseWb65Hxedg5ZGZCvI";
        
        const miSupabase = window.supabase || (typeof supabase !== 'undefined' ? supabase : null);
        window._supabase = miSupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function horaAMinutos(horaStr) {
            if (!horaStr) return 0;
            try {
                let limpia = horaStr.trim().toUpperCase();
                const tieneAmpm = limpia.includes('AM') || limpia.includes('PM');
                
                if (tieneAmpm) {
                    let [time, modifier] = limpia.split(' ');
                    if (!modifier) {
                        modifier = limpia.slice(-2);
                        time = limpia.slice(0, -2);
                    }
                    let [hours, minutes] = time.split(':').map(Number);
                    if (isNaN(hours)) hours = 0;
                    if (isNaN(minutes)) minutes = 0;
                    
                    if (hours === 12 && modifier === 'AM') hours = 0;
                    if (modifier === 'PM' && hours !== 12) hours += 12;
                    return (hours * 60) + minutes;
                } else {
                    let [hours, minutes] = limpia.split(':').map(Number);
                    if (isNaN(hours)) hours = 0;
                    if (isNaN(minutes)) minutes = 0;
                    return (hours * 60) + minutes;
                }
            } catch (e) {
                console.error("Error convirtiendo hora:", horaStr, e);
                return 0;
            }
        }

        async function actualizarPantallaTV() {
            const hoy = new Date();
            const offset = hoy.getTimezoneOffset();
            const hoyLocal = new Date(hoy.getTime() - (offset * 60 * 1000));
            const fechaHoy = hoyLocal.toISOString().split('T')[0];

            // Muestra la fecha que está buscando en el subtítulo para verificar si coincide con tus citas de Supabase
            document.getElementById('fechaSubtitulo').innerText = `Turnos de Hoy: ${fechaHoy}`;

            const ahoraEnMinutos = (hoy.getHours() * 60) + hoy.getMinutes();

            try {
                const { data: reservas, error } = await window._supabase
                    .from('reservas')
                    .select('*')
                    .eq('fecha', fechaHoy);

                if (error) throw error;

                const listaEspera = document.getElementById('listaEspera');

                if (!reservas || reservas.length === 0) {
                    document.getElementById('totalTurnos').innerText = "Total: 0";
                    document.getElementById('actualNombre').innerText = "Libre";
                    document.getElementById('actualServicio').innerText = "No hay citas registradas en Supabase para hoy";
                    document.getElementById('actualHora').innerText = "--:--";
                    listaEspera.innerHTML = `<div class="no-data">💈 No hay turnos agendados para la fecha ${fechaHoy}</div>`;
                    return;
                }

                reservas.sort((a, b) => horaAMinutos(a.hora) - horaAMinutos(b.hora));
                document.getElementById('totalTurnos').innerText = `Total: ${reservas.length}`;

                const duracionCorte = 40; 

                const turnosActivos = reservas.filter(cita => {
                    const horaCitaMinutos = horaAMinutos(cita.hora);
                    return (horaCitaMinutos + duracionCorte) > ahoraEnMinutos;
                });

                if (turnosActivos.length === 0) {
                    document.getElementById('actualNombre').innerText = "Libre";
                    document.getElementById('actualServicio').innerText = "Citas concluidas por hoy";
                    document.getElementById('actualHora').innerText = "--:--";
                    listaEspera.innerHTML = '<div class="no-data">💈 Todas las citas de hoy finalizaron.</div>';
                    return;
                }

                const primero = turnosActivos[0];
                document.getElementById('actualNombre').innerText = primero.cliente || "Cliente";
                document.getElementById('actualServicio').innerText = primero.servicio || "Corte de Pelo";
                document.getElementById('actualHora').innerText = primero.hora;

                const siguientes = turnosActivos.slice(1);
                if (siguientes.length === 0) {
                    listaEspera.innerHTML = '<div class="no-data">Próximo turno libre</div>';
                } else {
                    let htmlSiguientes = "";
                    siguientes.forEach(cita => {
                        htmlSiguientes += `
                            <div class="item-reserva">
                                <div class="info-cliente">
                                    <span class="info-nombre">${cita.cliente || "Cliente"}</span>
                                    <span class="info-servicio">✂️ ${cita.servicio || "Servicio"}</span>
                                </div>
                                <span class="info-hora">${cita.hora}</span>
                            </div>
                        `;
                    });
                    listaEspera.innerHTML = htmlSiguientes;
                }

            } catch (err) {
                console.error("Error cargando datos para la TV:", err);
                document.getElementById('listaEspera').innerHTML = '<div class="no-data">⚠️ Error de conexión con la base de datos.</div>';
            }
        }

        window._supabase
            .channel('cambios-tv')
            .on(
                'postgres_changes', 
                { event: '*', schema: 'public', table: 'reservas' }, 
                () => { actualizarPantallaTV(); }
            )
            .subscribe();

        actualizarPantallaTV();
        setInterval(actualizarPantallaTV, 60000);
    </script>
</body>
</html>
