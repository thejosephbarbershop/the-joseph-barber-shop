        .form-content {

        .input-field {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        /* --- BOTONES DE SELECCIÓN (GRID) --- */
        .selector-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .selector-item {
            display: none;
        }

        .selector-label {
            display: block;
            background-color: var(--white);
            border: 2px solid #eee;
            border-radius: 14px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            height: 100%;
            box-sizing: border-box;
        }

        .selector-label:hover {
            border-color: var(--accent-color);
            background-color: #fffdf7;
        }

        .selector-item:checked + .selector-label {
            border-color: var(--accent-color);
            background-color: var(--primary-color);
            color: var(--white);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .selector-item:checked + .selector-label .item-desc {
            color: var(--accent-color);
        }

        .item-name {
            display: block;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .item-desc {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-top: 4px;
            font-weight: 500;
        }

        /* --- ESTILOS PARA LAS HORAS OCUPADAS --- */
        .selector-item:disabled + .selector-label {
            background-color: #e0e0e0 !important;
            border-color: #ccc !important;
            color: #999 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }

        .selector-item:disabled + .selector-label .item-desc {
            color: #aaa !important;
        }

        /* --- BOTÓN ENVIAR A WHATSAPP --- */
                /* --- BOTÓN ENVIAR A WHATSAPP FIJO ABAJO --- */
        .confirm-btn {

        }

        /* Espacio extra al final del formulario para que el botón fijo no tape las últimas horas */
        .form-content {
            padding: 20px 20px 100px 20px !important;
        }

        }

        .confirm-btn:hover {
            background-color: #20ba59;
            transform: translateY(-2px);
        }
    </style>
</head>

<script>const SUPABASE_URL = "https://xnfmqumhhxpkrigizvlu.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_4WhsBfpOQAvHFxWXEBriMw_Vvg1fY-r";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const inputFecha = document.getElementById('fecha');
const opcionesHora = document.querySelectorAll('.hora-opcion');
const formulario = document.getElementById('reserva-form');

// Establecer fecha mínima hoy
const hoy = new Date().toISOString().split('T')[0];
inputFecha.min = hoy;

// 1. REVISAR QUÉ HORAS ESTÁN OCUPADAS AL CAMBIAR FECHA
inputFecha.addEventListener('change', async () => {
    const fechaSeleccionada = inputFecha.value;
    if (!fechaSeleccionada) return;
    try {
        const { data: reservas, error } = await _supabase
            .from('reservas')
            .select('hora')
            .eq('fecha', fechaSeleccionada);
            
        if (error) throw error;
        
        const horasOcupadas = reservas.map(r => r.hora);
        
        opcionesHora.forEach(input => {
            const horaValor = input.value;
            const label = input.nextElementSibling;
            const desc = label.querySelector('.desc-hora');
            
            if (horasOcupadas.includes(horaValor)) {
                input.disabled = true;
                input.checked = false;
                desc.textContent = "Ocupado";
            } else {
                input.disabled = false;
                desc.textContent = "Disponible";
            }
        });
    } catch (err) {
        console.error("Error consultando horarios:", err.message);
    }
});

// 2. GUARDAR RESERVA Y ABRIR WHATSAPP
formulario.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nombre = document.getElementById('client-name').value;
    const telefono = document.getElementById('client-phone').value;
    const servicio = document.querySelector('input[name="servicio"]:checked').value;
    const fecha = inputFecha.value;
    const horaSeleccionadaInput = document.querySelector('input[name="hora"]:checked');
    
    if (!horaSeleccionadaInput) {
        alert("Por favor, selecciona un horario.");
        return;
    }
    const hora = horaSeleccionadaInput.value;
    
    try {
        // Doble verificación instantánea
        const { data: duplicado } = await _supabase
            .from('reservas')
            .select('id')
            .eq('fecha', fecha)
            .eq('hora', hora);
            
        if (duplicado && duplicado.length > 0) {
            alert("¡Lo sentimos! Alguien acaba de reservar esa misma hora hace unos segundos. Por favor elige otra.");
            inputFecha.dispatchEvent(new Event('change'));
            return;
        }
        
        // Insertar registro en Supabase
        const { error } = await _supabase
            .from('reservas')
            .insert([{ fecha: fecha, hora: hora }]);
            
        if (error) throw error;
        
        // NÚMERO REAL ASIGNADO (REPÚBLICA DOMINICANA)
        const telefonoBarberia = "18299702130";
        const mensaje = `💈 *NUEVA CITA - THE JOSEPH BARBERSHOP* 💈\n\n👤 *Cliente:* ${nombre}\n📞 *Teléfono:* ${telefono}\n✂️ *Servicio:* ${servicio}\n📅 *Fecha:* ${fecha}\n⏰ *Hora:* ${hora}\n\n_¡Por favor confirma mi espacio!_`;
        
        const urlWhatsapp = `https://whatsapp.com{telefonoBarberia}&text=${encodeURIComponent(mensaje)}`;
        
        alert("¡Cita reservada con éxito en el sistema! Abriendo WhatsApp para confirmación...");
       window.location.href = urlWhatsapp;
        inputFecha.dispatchEvent(new Event('change'));
    } catch (err) {
        alert("Hubo un percance guardando tu espacio: " + err.message);
    }
});
</script>
