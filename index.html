
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Citas - The Joseph Barbershop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .form-container { max-width: 500px; background: white; padding: 20px; margin: 0 auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="tel"], input[type="date"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .grid-horas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .hora-opcion-container { border: 1px solid #ddd; padding: 10px; border-radius: 4px; text-align: center; cursor: pointer; background: #fff; }
        .hora-opcion-container input { display: none; }
        .hora-opcion-container:has(input:checked) { background: #e0f0ff; border-color: #007bff; }
        .hora-opcion-container:has(input:disabled) { background: #f0f0f0; border-color: #ccc; color: #999; cursor: not-allowed; }
        .desc-hora { display: block; font-size: 12px; color: #28a745; font-weight: bold; }
        .hora-opcion-container:has(input:disabled) .desc-hora { color: #dc3545; }
        .btn-enviar { width: 100%; padding: 12px; background: #25d366; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-enviar:hover { background: #128c7e; }
        .radio-group { display: flex; gap: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <form id="reserva-form">
        <div class="form-group">
            <label for="client-name">Nombre Completo</label>
            <input type="text" id="client-name" required placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label for="client-phone">Teléfono</label>
            <input type="tel" id="client-phone" required placeholder="Ej. 18095551234">
        </div>

        <div class="form-group">
            <label>Selecciona el Servicio</label>
            <div class="radio-group">
                <label><input type="radio" name="servicio" value="Corte de Cabello" checked> Corte de Cabello</label>
                <label><input type="radio" name="servicio" value="Barba"> Barba</label>
                <label><input type="radio" name="servicio" value="Combo Completo"> Combo Completo</label>
            </div>
        </div>

        <div class="form-group">
            <label>Selecciona tu Barbero</label>
            <div class="radio-group">
                <label><input type="radio" name="barbero" class="barbero-opcion" value="Joseph" checked> Joseph</label>
                <label><input type="radio" name="barbero" class="barbero-opcion" value="Carlos"> Carlos</label>
            </div>
        </div>

        <div class="form-group">
            <label for="fecha">Selecciona la Fecha</label>
            <input type="date" id="fecha" required>
        </div>

        <div class="form-group">
            <label>Selecciona la Hora</label>
            <div class="grid-horas">
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="08:00 AM">
                    <span>08:00 AM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="09:00 AM">
                    <span>09:00 AM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="10:00 AM">
                    <span>10:00 AM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="11:00 AM">
                    <span>11:00 AM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="12:00 PM">
                    <span>12:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="01:00 PM">
                    <span>01:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="02:00 PM">
                    <span>02:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="03:00 PM">
                    <span>03:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="04:00 PM">
                    <span>04:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="05:00 PM">
                    <span>05:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="06:00 PM">
                    <span>06:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="07:00 PM">
                    <span>07:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
                <label class="hora-opcion-container">
                    <input type="radio" name="hora" class="hora-opcion" value="08:00 PM">
                    <span>08:00 PM</span>
                    <span class="desc-hora">Disponible</span>
                </label>
            </div>
        </div>

        <button type="submit" class="btn-enviar">Confirmar y enviar Cita</button>
    </form>
</div>

<script>
// Configuración de Supabase (Reemplaza con tus credenciales reales)
const SUPABASE_URL = "https://supabase.co"; 
const SUPABASE_KEY = "sb_publishable_4WhsBfpOQAvHFxWXEBriMw_Vvg1fY-r";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const inputFecha = document.getElementById('fecha');
const opcionesHora = document.querySelectorAll('.hora-opcion');
const opcionesBarbero = document.querySelectorAll('.barbero-opcion');
const formulario = document.getElementById('reserva-form');

// Establecer fecha mínima hoy
const hoy = new Date().toISOString().split('T')[0];
inputFecha.min = hoy;

// FUNCIÓN PARA REVISAR Y BLOQUEAR HORAS EN LA BASE DE DATOS
async function actualizarHorariosDisponibles() {
    const fechaSeleccionada = inputFecha.value;
    const barberoSeleccionadoInput = document.querySelector('input[name="barbero"]:checked');
    if (!fechaSeleccionada || !barberoSeleccionadoInput) return;
    
    const barberoSeleccionado = barberoSeleccionadoInput.value;
    try {
        const { data: reservas, error } = await _supabase
            .from('reservas')
            .select('hora')
            .eq('fecha', fechaSeleccionada)
            .eq('barbero', barberoSeleccionado);
            
        if (error) throw error;
        const horasOcupadas = reservas ? reservas.map(r => r.hora) : [];
        
        opcionesHora.forEach(input => {
            const horaValor = input.value;
            const label = input.parentElement;
            const desc = label ? label.querySelector('.desc-hora') : null;
            
            if (horasOcupadas.includes(horaValor)) {
                input.disabled = true;
                input.checked = false;
                if (desc) desc.textContent = "Ocupado";
            } else {
                input.disabled = false;
                if (desc) desc.textContent = "Disponible";
            }
        });
    } catch (err) {
        console.error("Error consultando horarios:", err.message);
    }
}

// Escuchar cambios tanto en el calendario como al elegir barbero
inputFecha.addEventListener('change', actualizarHorariosDisponibles);
opcionesBarbero.forEach(radio => radio.addEventListener('change', actualizarHorariosDisponibles));

// GUARDAR RESERVA Y REDIRIGIR A WHATSAPP
formulario.addEventListener('submit', async (e) => {
    e.preventDefault();
    e.stopPropagation();
    
    const nombre = document.getElementById('client-name').value;
    const telefono = document.getElementById('client-phone').value;
    const servicio = document.querySelector('input[name="servicio"]:checked').value;
    const barbero = document.querySelector('input[name="barbero"]:checked').value;
    const fecha = inputFecha.value;
    const horaSeleccionadaInput = document.querySelector('input[name="hora"]:checked');
    
    if (!horaSeleccionadaInput) {
        alert("Por favor, selecciona un horario.");
        return;
    }
    const hora = horaSeleccionadaInput.value;

    try {
        // 1. Doble verificación instantánea por barbero
        const { data: duplicado, error: errorDup } = await _supabase
            .from('reservas')
            .select('id')
            .eq('fecha', fecha)
            .eq('hora', hora)
            .eq('barbero', barbero);

        if (errorDup) {
            alert("Error de conexión con la base de datos: " + errorDup.message);
            return;
        }

        if (duplicado && duplicado.length > 0) {
            alert("¡Lo sentimos! Ese barbero acaba de ser reservado en esa hora. Por favor elige otro horario o barbero.");
            actualizarHorariosDisponibles();
            return;
        }

        // 2. Guardar registro en Supabase
        const { error: errorInsert } = await _supabase
            .from('reservas')
            .insert([{ fecha: fecha, hora: hora, barbero: barbero }]);

        if (errorInsert) {
            alert("No se pudo guardar la cita en la base de datos: " + errorInsert.message);
            return;
        }

        // 3. ENLACE DE WHATSAPP DIRECTO
        const telefonoBarberia = "18299702130";
        
        // Corrección de Template String con acentos invertidos (``)
        const mensaje = `💈 *NUEVA CITA - THE JOSEPH BARBERSHOP* 💈\n\n👤 *Cliente:* ${nombre}\n📞 *Teléfono:* ${telefono}\n✂️ *Servicio:* ${servicio}\n🧔 *Barbero:* ${barbero}\n📅 *Fecha:* ${fecha}\n⏰ *Hora:* ${hora}\n\n_¡Por favor confirma mi espacio!_`;
        
        // URL estructurada correctamente para API de WhatsApp
        const urlWhatsapp = `https://api.whatsapp.com/send?phone=${telefonoBarberia}&text=${encodeURIComponent(mensaje)}`;
        
        alert("¡Cita registrada con éxito! Presiona Aceptar para ir a WhatsApp y confirmar.");
        window.location.href = urlWhatsapp;

    } catch (err) {
        alert("Ocurrió un error inesperado: " + err.message);
    }
});
</script>
</body>
</html>
