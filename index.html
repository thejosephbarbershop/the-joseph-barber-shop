<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Reserva tu Cita - The Joseph Barbershop</title>

    <link rel="icon" type="image/png" sizes="192x192" href="https://ibb.co/LzbTQvbL?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="https://ibb.co/LzbTQvbL?v=2">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0b0c10;         /* Fondo oscuro profundo */
            --bg-card: #1f2833;         /* Gris azulado oscuro premium */
            --accent-gold: #c5a880;     /* Dorado champaña (más elegante) */
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: #151a21;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=600') center/cover;
            padding: 45px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        header p {
            margin: 8px 0 0 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .form-content, .cancel-content {
            padding: 25px 20px 110px 20px !important;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: block;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-card);
            border: 1px solid #2f3b4c;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            margin-bottom: 12px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(197, 168, 128, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* DISEÑO DE TARJETAS DE SERVICIOS CON IMÁGENES */
        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .services-grid div {
            position: relative;
        }

        /* Ocultar el radio button nativo pero mantenerlo accesible */
        .selector-item {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 3;
            margin: 0;
        }

        .service-card-label {
            display: flex;
            align-items: center;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2f3b4c;
            height: 85px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .service-card-label::before {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(90deg, rgba(11,12,16,0.9) 40%, rgba(11,12,16,0.4) 100%);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .service-info {
            position: relative;
            z-index: 2;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
        }

        .service-desc {
            font-size: 0.8rem;
            color: var(--accent-gold);
            margin-top: 2px;
        }

        /* Estados de Selección */
        .selector-item:checked + .service-card-label {
            border-color: var(--accent-gold);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(197, 168, 128, 0.3);
        }

        .selector-item:checked + .service-card-label::before {
            background: linear-gradient(90deg, rgba(31,40,51,0.95) 50%, rgba(31,40,51,0.6) 100%);
        }

        /* DISEÑO DE SELECCIÓN DE BARBEROS CON AVATAR */
        .barbers-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .barbers-group div {
            position: relative;
        }

        .barber-card-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid #2f3b4c;
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .barber-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            border: 2px solid #2f3b4c;
            transition: all 0.3s ease;
        }

        .barber-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
        }

        .barber-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .selector-item:checked + .barber-card-label {
            border-color: var(--accent-gold);
            background-color: #242d38;
        }

        .selector-item:checked + .barber-card-label .barber-avatar {
            border-color: var(--accent-gold);
            transform: scale(1.08);
        }

        /* HORARIOS DE ALTA GAMA */
        .hours-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .hours-grid div {
            position: relative;
        }

        .hour-label {
            display: block;
            background-color: var(--bg-card);
            border: 1px solid #2f3b4c;
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .selector-item:checked + .hour-label {
            background-color: var(--accent-gold);
            color: #000000;
            font-weight: 600;
            border-color: var(--accent-gold);
        }

        /* BOTONES DE ACCIÓN */
        .confirm-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: calc(100% - 40px);
            max-width: 410px;
            padding: 16px;
            font-family: 'Poppins', sans-serif;
            color: #000000;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .btn-gold {
            background-color: var(--accent-gold);
        }

        .btn-gold:hover {
            background-color: #dbbc93;
            transform: translateX(-50%) translateY(-2px);
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: #fff;
        }

        .btn-danger:disabled {
            background-color: #222 !important;
            color: #555 !important;
            border: 1px solid #333 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: translateX(-50%) !important;
        }

        .hidden {
            display: none !important;
        }

        .info-card {
            background-color: var(--bg-card);
            border: 1px dashed #444;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }

        .info-line {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .info-line strong {
            color: #fff;
        }

        .texto-alerta {
            grid-column: span 3;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 id="header-title">THE JOSEPH BARBERSHOP</h1>
            <p id="header-subtitle">RESERVA TU EXPERIENCIA</p>
        </header>

        <form id="reserva-form" class="form-content">
            
            <div class="form-section">
                <span class="section-title">1. Tus Datos de Contacto</span>
                <input type="text" id="client-name" class="input-field" placeholder="Nombre completo" required>

            <div class="form-section">

                            <div class="service-info">
                                <span class="service-name">Corte de Pelo</span>

                    <div>

                        <label for="srv2" class="service-card-label" style="background: url('https://images.unsplash.com/photo-1512864084360-7c0c4d0a0845?auto=format&fit=crop&q=80&w=300') center/cover;">
                            <div class="service-info">
                                <span class="service-name">Cerquillo</span>

                    </div>

                    <div>

                        <label for="srv4" class="service-card-label" style="background: url('https://images.unsplash.com/photo-1605497746445-97d1b0a9eaf4?auto=format&fit=crop&q=80&w=300') center/cover;">
                            <div class="service-info">
                                <span class="service-name">Trenzado Normal</span>
                                <span class="service-desc">60 min • Diseño a mano</span>

                        </label>
                    </div>

                    <div>
                        <input type="radio" id="srv5" name="servicio" value="Trenzado con pelo" data-duracion="360" class="selector-item">
                        <label for="srv5" class="service-card-label" style="background: url('https://images.unsplash.com/photo-1629000214131-04b77f19f2f8?auto=format&fit=crop&q=80&w=300') center/cover;">
                            <div class="service-info">
                                <span class="service-name">Trenzado con Pelo</span>

                    <div>
                        <input type="radio" id="srv6" name="servicio" value="Facial" data-duracion="60" class="selector-item">
                        <label for="srv6" class="service-card-label" style="background: url('https://images.unsplash.com/photo-1515377905703-c4788e51af15?auto=format&fit=crop&q=80&w=300') center/cover;">
                            <div class="service-info">
                                <span class="service-name">Facial</span>
                                <span class="service-desc">60 min • Limpieza e hidratación</span>
                            </div>

                    </div>

                    <div>
                        <input type="radio" id="srv3" name="servicio" value="Haircut niños" data-duracion="45" class="selector-item">
                        <label for="srv3" class="service-card-label" style="background: url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=300') center/cover;">
                            <div class="service-info">
                                <span class="service-name">Haircut Niños</span>
                                <span class="service-desc">45 min • Menores de 12 años</span>
                            </div>
                        </label>
                    </div>

                </div>
            </div>

            <div class="form-section">
                <span class="section-title">3. Selecciona tu Profesional</span>
                <div class="barbers-group">
                    
                    <div>
                        <input type="radio" id="barb1" name="barbero" value="Joseph" class="selector-item barbero-opcion" required>
                        <label for="barb1" class="barber-card-label">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200" alt="Joseph" class="barber-avatar">
                            <span class="barber-name">Joseph</span>
                            <span class="barber-role">Barbero Máster</span>
                        </label>
                    </div>

                    <div>
                        <input type="radio" id="barb2" name="barbero" value="Vanessa" class="selector-item barbero-opcion">
                        <label for="barb2" class="barber-card-label">
                            <img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&q=80&w=200" alt="Vanessa" class="barber-avatar">
                            <span class="barber-name">Vanessa</span>

            <div class="form-section">
                <span class="section-title">4. Elige el Día</span>
                <input type="date" id="fecha" class="input-field" required>

            <div class="form-section">
                <span class="section-title">5. Horarios Disponibles</span>
                <div class="hours-grid" id="contenedor-horas">
                    <div class="texto-alerta">Elige fecha y barbero para calcular horarios...</div>

        <div id="modulo-cancelar" class="cancel-content hidden">
            <div class="form-section">
                <span class="section-title" style="color: var(--danger-color);">Cancelar Espacio</span>
                <div class="info-card">
                    <div class="info-line"><strong>Cliente:</strong> <span id="cancel-info-cliente">Cargando...</span></div>
                    <div class="info-line"><strong>Servicio:</strong> <span id="cancel-info-servicio">-</span></div>
                    <div class="info-line"><strong>Barbero:</strong> <span id="cancel-info-barbero">-</span></div>
                    <div class="info-line"><strong>Fecha:</strong> <span id="cancel-info-fecha">-</span></div>
                    <div class="info-line"><strong>Horario:</strong> <span id="cancel-info-hora">-</span></div>
                </div>
                <p id="mensaje-status" style="text-align: center; margin-top: 15px;"></p>
            </div>
            <button id="btn-ejecutar-cancelar" class="confirm-btn btn-danger" disabled>
                Confirmar Cancelación
            </button>
        </div>

    </div>

   <script>
    // 🛡️ --- ESCUDO DE SEGURIDAD ANTIBLOQUEO PARA EMAILJS ---
    let emailjsInicializado = false;
    try {
        if (typeof emailjs !== 'undefined') {
            emailjs.init({ publicKey: "GQ0nATFCZx9T_S2wV" });
            emailjsInicializado = true;
            console.log("EmailJS inicializado correctamente.");
        } else {
            console.warn("EmailJS no está definido en el entorno global.");
        }
    } catch (e) {
        console.warn("EmailJS bloqueado por restricciones del contenedor (Sandbox). Continuando carga segura...");
    }

    // 🔑 --- CREDENCIALES DE ACCESO ---
    const _supabaseUrl = "https://xnfmqumhhxpkrigizvlu.supabase.co";
    const _supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZm1xdW1oaHhwa3JpZ2l6dmx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTE3NjgsImV4cCI6MjA5NTQ4Nzc2OH0.zNSZ4Nw2Iz2IieExt9SErJddPseWb65Hxedg5ZGZCvI";
    
    // Conexión segura global a Supabase
    const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

    // Elementos del DOM
    const formReserva = document.getElementById('reserva-form');
    const moduloCancelar = document.getElementById('modulo-cancelar');
    const selectorFecha = document.getElementById('fecha');
    const contenedorHoras = document.getElementById('contenedor-horas');
    const opcionesBarbero = document.querySelectorAll('.barbero-opcion');
    const hTitle = document.getElementById('header-title');
    const hSubtitle = document.getElementById('header-subtitle');

    // Configuración de Horarios Base (Bloques de 15 minutos)
    const HORAS_SEMANA = [];
    for(let h=9; h<19; h++) {
        HORAS_SEMANA.push(`${h.toString().padStart(2,'0')}:00`, `${h.toString().padStart(2,'0')}:15`, `${h.toString().padStart(2,'0')}:30`, `${h.toString().padStart(2,'0')}:45`);
    }
    HORAS_SEMANA.push("19:00");

    const HORAS_SABADO = [];
    for(let h=8; h<19; h++) {
        HORAS_SABADO.push(`${h.toString().padStart(2,'0')}:00`, `${h.toString().padStart(2,'0')}:15`, `${h.toString().padStart(2,'0')}:30`, `${h.toString().padStart(2,'0')}:45`);
    }
    HORAS_SABADO.push("19:00");

    const HORAS_DOMINGO = [];
    for(let h=9; h<14; h++) {
        HORAS_DOMINGO.push(`${h.toString().padStart(2,'0')}:00`, `${h.toString().padStart(2,'0')}:15`, `${h.toString().padStart(2,'0')}:30`, `${h.toString().padStart(2,'0')}:45`);
    }
    HORAS_DOMINGO.push("14:00");

    // Restricción de fechas (Mínimo hoy)
    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    selectorFecha.min = `${yyyy}-${mm}-${dd}`;

    // Escuchadores para actualizar horarios en tiempo real
    selectorFecha.addEventListener('change', actualizarBloqueHorarios);
    opcionesBarbero.forEach(b => b.addEventListener('change', actualizarBloqueHorarios));

    async function actualizarBloqueHorarios() {
        const fechaSel = selectorFecha.value;
        const barberoSel = document.querySelector('input[name="barbero"]:checked')?.value;

        if (!fechaSel || !barberoSel) {
            contenedorHoras.innerHTML = '<div class="texto-alerta">Selecciona fecha y barbero...</div>';
            return;
        }

        contenedorHoras.innerHTML = '<div class="texto-alerta">Consultando agenda...</div>';

        const fechaObj = new Date(fechaSel + 'T00:00:00');
        const diaSemana = fechaObj.getDay(); 

        let listaHorariosBase = [...HORAS_SEMANA];
        if (diaSemana === 6) listaHorariosBase = [...HORAS_SABADO];
        if (diaSemana === 0) listaHorariosBase = [...HORAS_DOMINGO];

        try {
            // Obtener citas ocupadas en Supabase
            const { data: citas, error } = await supabaseClient
                .from('reservas')
                .select('hora, duracion')
                .eq('fecha', fechaSel)
                .eq('barbero', barberoSel);

            if (error) throw error;

            let minutosOcupados = [];
            citas.forEach(c => {
                const [h, m] = c.hora.split(':').map(Number);
                const inicioEnMinutos = h * 60 + m;
                const finEnMinutos = inicioEnMinutos + parseInt(c.duracion);
                
                for (let min = inicioEnMinutos; min < finEnMinutos; min += 15) {
                    minutosOcupados.push(min);
                }
            });

            const servicioSeleccionado = document.querySelector('input[name="servicio"]:checked');
            const duracionServicio = servicioSeleccionado ? parseInt(servicioSeleccionado.dataset.duracion) : 30;

            contenedorHoras.innerHTML = '';
            let contadorDisponibles = 0;

            listaHorariosBase.forEach((horaStr, index) => {
                const [h, m] = horaStr.split(':').map(Number);
                const horaActualEnMinutos = h * 60 + m;

                if (fechaSel === `${yyyy}-${mm}-${dd}`) {
                    const ahora = new Date();
                    const minutosAhora = ahora.getHours() * 60 + ahora.getMinutes();
                    if (horaActualEnMinutos <= minutosAhora + 15) return; 
                }

                let espacioLibre = true;
                for (let offset = 0; offset < duracionServicio; offset += 15) {
                    if (minutosOcupados.includes(horaActualEnMinutos + offset)) {
                        espacioLibre = false;
                        break;
                    }
                    if (index + (offset/15) >= listaHorariosBase.length) {
                        espacioLibre = false; 
                        break;
                    }
                }

                if (espacioLibre) {
                    contadorDisponibles++;
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <input type="radio" id="time_${horaStr}" name="hora" value="${horaStr}" class="selector-item" required>
                        <label for="time_${horaStr}" class="hour-label">
                            <span>${horaStr}</span>
                        </label>
                    `;
                    contenedorHoras.appendChild(div);
                }
            });

            if (contadorDisponibles === 0) {
                contenedorHoras.innerHTML = '<div class="texto-alerta" style="color:var(--danger-color);">No hay espacios disponibles</div>';
            }

        } catch (err) {
            console.error(err);
            contenedorHoras.innerHTML = '<div class="texto-alerta" style="color:var(--danger-color);">Error de conexión</div>';
        }
    }

    document.getElementsByName('servicio').forEach(el => {
        el.addEventListener('change', () => {
            if(selectorFecha.value && document.querySelector('input[name="barbero"]:checked')) {
                actualizarBloqueHorarios();
            }
        });
    });

    // 3. Procesamiento del Formulario de Reserva
    formReserva.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btnConfirmar = formReserva.querySelector('.confirm-btn');
        btnConfirmar.disabled = true;
        btnConfirmar.innerText = "PROCESANDO...";

        const cliente = document.getElementById('client-name').value.trim();
        const telefono = document.getElementById('client-phone').value.trim();
        const servicio = document.querySelector('input[name="servicio"]:checked').value;
        const duracion = document.querySelector('input[name="servicio"]:checked').dataset.duracion;
        const barbero = document.querySelector('input[name="barbero"]:checked').value;
        const fecha = selectorFecha.value;
        const hora = document.querySelector('input[name="hora"]:checked').value;

        try {
            const { data, error } = await supabaseClient
                .from('reservas')
                .insert([{ cliente, telefono, servicio, duracion, barbero, fecha, hora }])
                .select();

            if (error) throw error;
            
            const idReserva = data[0].id;
            const linkCancelacion = `${window.location.origin}${window.location.pathname}?cancelar=${idReserva}`;

            // 🛡️ Envío protegido de EmailJS
            if (emailjsInicializado) {
                const emailParams = {
                    cliente_nombre: cliente,
                    cliente_telefono: telefono,
                    servicio_nombre: servicio,
                    barbero_nombre: barbero,
                    reserva_fecha: fecha,
                    reserva_hora: hora,
                    link_cancelacion: linkCancelacion
                };
                emailjs.send("service_z2lbr3y", "template_7phspmb", emailParams).catch(e => console.error(e));
            }

            const textoWhatsapp = `*¡Nueva Reserva Premium!*%0A%0A` +
                                 `• *Cliente:* ${cliente}%0A` +
                                 `• *Servicio:* ${servicio}%0A` +
                                 `• *Barbero:* ${barbero}%0A` +
                                 `• *Fecha:* ${fecha}%0A` +
                                 `• *Hora:* ${hora}%0A%0A` +
                                 `_Link de gestión:_ ${linkCancelacion}`;
            
            const celularDestino = "18299702130"; 
            window.location.href = `https://wa.me/${celularDestino}?text=${textoWhatsapp}`;

        } catch (err) {
            alert("Hubo un problema al procesar tu espacio. Inténtalo de nuevo.");
            btnConfirmar.disabled = false;
            btnConfirmar.innerText = "Agendar Cita Premium";
        }
    });

    // 4. Módulo de Cancelación Automática 
    window.addEventListener('DOMContentLoaded', async () => {
        // 🛡️ Autocompletado protegido contra bloqueos de LocalStorage
        try {
            const nombreGuardado = localStorage.getItem("barberia_nombre");
            const telefonoGuardado = localStorage.getItem("barberia_telefono");
            if (nombreGuardado) document.getElementById("client-name").value = nombreGuardado;
            if (telefonoGuardado) document.getElementById("client-phone").value = telefonoGuardado;
        } catch(e) {
            console.warn("LocalStorage no accesible en este visor.");
        }

        const parametrosURL = new URLSearchParams(window.location.search);
        const idCitaACancelar = parametrosURL.get('cancelar');

        if (idCitaACancelar) {
            formReserva.classList.add('hidden');
            moduloCancelar.classList.remove('hidden');
            hTitle.innerText = "GESTIÓN DE CITA";
            hSubtitle.innerText = "CANCELACIÓN INMEDIATA";

            try {
                const { data: cita, error } = await supabaseClient
                    .from('reservas')
                    .select('*')
                    .eq('id', idCitaACancelar)
                    .single();

                if (error || !cita) {
                    document.getElementById('cancel-info-cliente').innerText = "Cita no encontrada o ya liberada.";
                    return;
                }

                document.getElementById('cancel-info-cliente').innerText = cita.cliente;
                document.getElementById('cancel-info-servicio').innerText = cita.servicio;
                document.getElementById('cancel-info-barbero').innerText = cita.barbero;
                document.getElementById('cancel-info-fecha').innerText = cita.fecha;
                document.getElementById('cancel-info-hora').innerText = cita.hora;

                const btnEjecutar = document.getElementById('btn-ejecutar-cancelar');
                btnEjecutar.disabled = false;

                btnEjecutar.addEventListener('click', async () => {
                    btnEjecutar.disabled = true;
                    btnEjecutar.innerText = "LIBERANDO...";

                    const { error: deleteError } = await supabaseClient
                        .from('reservas')
                        .delete()
                        .eq('id', idCitaACancelar);

                    if (deleteError) {
                        alert("No se pudo procesar la cancelación.");
                        btnEjecutar.disabled = false;
                        btnEjecutar.innerText = "Confirmar Cancelación";
                    } else {
                        document.getElementById('mensaje-status').innerHTML = "<span style='color:var(--danger-color)'>ESPACIO LIBERADO CON ÉXITO. YA PUEDES CERRAR ESTA VENTANA.</span>";
                        btnEjecutar.classList.add('hidden');
                    }
                });

            } catch (err) {
                console.error(err);
            }
        }
    });
</script>
</body>
</html>
