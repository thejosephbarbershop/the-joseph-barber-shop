        :root {
            --bg-main: #0b0c10;         /* Fondo oscuro profundo */

            --danger-color: #e74c3c;
        }

        body {

            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: #151a21;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=600') center/cover;
            padding: 45px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-gold);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        header p {
            margin: 8px 0 0 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-gold);
            font-weight: 600;
        }

        .form-content, .cancel-content {
            padding: 25px 20px 110px 20px !important;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: block;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-card);
            border: 1px solid #2f3b4c;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            margin-bottom: 12px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(197, 168, 128, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        /* DISEÑO DE TARJETAS DE SERVICIOS CON IMÁGENES */
        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .service-card-label {
            display: flex;
            align-items: center;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #2f3b4c;
            height: 85px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Capa oscura interna de la imagen para legibilidad */
        .service-card-label::before {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(90deg, rgba(11,12,16,0.9) 40%, rgba(11,12,16,0.4) 100%);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .service-info {
            position: relative;
            z-index: 2;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
        }

        .service-desc {
            font-size: 0.8rem;
            color: var(--accent-gold);
            margin-top: 2px;
        }

        /* Comportamiento al seleccionar Servicio */
        .selector-item:checked + .service-card-label {
            border-color: var(--accent-gold);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(197, 168, 128, 0.3);
        }

        .selector-item:checked + .service-card-label::before {
            background: linear-gradient(90deg, rgba(31,40,51,0.95) 50%, rgba(31,40,51,0.6) 100%);
        }

        /* DISEÑO DE SELECCIÓN DE BARBEROS CON AVATAR */
        .barbers-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .barber-card-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid #2f3b4c;
            border-radius: 16px;
            padding: 20px 10px;
            text-align: center;

            border-color: var(--accent-gold);
            transform: scale(1.08);

            grid-template-columns: repeat(3, 1fr); /* 3 por fila para optimizar espacio */
            gap: 10px;

            background-color: var(--bg-card);

        .confirm-btn {

            align-items: center;
            justify-content: center;
            width: calc(100% - 40px);
            max-width: 410px;
            padding: 16px;

            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;

            text-transform: uppercase;
            letter-spacing: 1px;

        .btn-gold {

        .btn-danger {
            background-color: var(--danger-color);
            color: #fff;
        }

        .btn-danger:disabled {
            background-color: #222 !important;
            color: #555 !important;
            border: 1px solid #333 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: translateX(-50%) !important;
        }

        .hidden {
            display: none !important;
        }

        .info-card {
            background-color: var(--bg-card);
            border: 1px dashed #444;
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }

        .info-line {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);

        }

        .texto-alerta {
            grid-column: span 3;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 15px 0;
        }

    // ==========================================
    // 🛠️ FUNCIÓN PARA CAMBIAR EL HORARIO DE CIERRE SEGÚN EL DÍA

    function ajustarHorarioCierre(fechaSeleccionada) {
        if (!fechaSeleccionada) return;
        
        const partes = fechaSeleccionada.split('-');
        const fechaObjeto = new Date(partes[0], partes[1] - 1, partes[2]);
        const numeroDia = fechaObjeto.getDay(); // 0 = Domingo, 1 = Lunes, ..., 6 = Sábado

        // Si es Lunes (1) a Jueves (4) -> Cierra a las 8:00 PM
        if (numeroDia >= 1 && numeroDia <= 4) {
            CIERRE_MINUTOS = 20 * 60;  
            console.log("Horario ajustado para Lunes-Jueves: Cierre a las 8:00 PM");
        } else {
            // Si es Viernes (5), Sábado (6) o Domingo (0) -> Cierra a las 12:00 AM Medianoche (1440 minutos)
            CIERRE_MINUTOS = 24 * 60;  
            console.log("Horario adjusted para Fin de Semana: Cierre a las 12:00 AM");
        }
    }

        let [time, modifier] = horaStr.split(' ');
        let [hours, minutes] = time.split(':').map(Number);
        if (hours === 12 && modifier === 'AM') hours = 0;
        if (modifier === 'PM' && hours !== 12) hours += 12;
        return (hours * 60) + minutes;
    }

    function convertirMinutosAString12h(minutosTotales) {
        let horas = Math.floor(minutosTotales / 60);
        let minutes = minutesTotales % 60;
        let ampm = horas >= 12 ? 'PM' : 'AM';
        horas = horas % 12;
        horas = horas ? horas : 12; 
        let strMinutos = String(minutes).padStart(2, '0');
        let strHoras = String(horas).padStart(2, '0');
        return `${strHoras}:${strMinutos} ${ampm}`;
    }

    function generarObjetoFecha(fechaStr, minutesTotales) {
        let horas = Math.floor(minutesTotales / 60);
        let minutos = minutesTotales % 60;
        if (horas >= 24) {
            horas = 23;
            minutos = 59;
        }
        return new Date(`${fechaStr}T${String(horas).padStart(2, '0')}:${String(minutos).padStart(2, '0')}:00`);
    }

    // ==========================================
    // 🎯 MOTOR CENTRAL: CÁLCULO Y GENERACIÓN DINÁMICA (Botonera Estilizada)
    // ==========================================
    async function actualizarHorariosDisponibles() {
        const fechaSeleccionada = inputFecha.value;
        const barberoSeleccionadoInput = document.querySelector('input[name="barbero"]:checked');
        const servicioSeleccionadoInput = document.querySelector('input[name="servicio"]:checked');
        
        if (!fechaSeleccionada || !barberoSeleccionadoInput) return;
        
        const duracionServicioSolicitado = servicioSeleccionadoInput ? parseInt(servicioSeleccionadoInput.getAttribute('data-duracion'), 10) : 45;
        const barberoSeleccionado = barberoSeleccionadoInput.value;
        const ahora = new Date();

        contenedorHoras.style.display = "grid";
        contenedorHoras.style.gridTemplateColumns = "repeat(auto-fill, minmax(100px, 1fr))";
        contenedorHoras.style.gap = "10px";
        contenedorHoras.style.padding = "10px 0";
        contenedorHoras.innerHTML = '<div class="texto-alerta" style="grid-column: 1/-1;">Calculando agenda perfecta...</div>';

        try {
            const { data: reservas, error } = await _supabase
                .from('reservas')
                .select('hora, duracion')
                .eq('fecha', fechaSeleccionada)
                .eq('barbero', barberoSeleccionado);

            if (error) throw error;

            let rangosOcupados = [];
            reservas.forEach(reserva => {
                if (!reserva.hora) return;
                let inicio = convertirStringAMinutos(reserva.hora);
                let fin = inicio + (reserva.duracion || 30);
                rangosOcupados.push({ inicio, fin });
            });

            rangosOcupados.sort((a, b) => a.inicio - b.inicio);

            let htmlBotones = "";
            let minutoPuntero = APERTURA_MINUTOS;
            let indexBotones = 1;

            while (minutoPuntero + duracionServicioSolicitado <= CIERRE_MINUTOS) {
                let colisiona = false;
                let inicioPropuesto = minutoPuntero;
                let finPropuesto = minutoPuntero + duracionServicioSolicitado;

                for (let rango of rangosOcupados) {
                    if (inicioPropuesto < rango.fin && finPropuesto > rango.inicio) {
                        colisiona = true;
                        minutoPuntero = rango.fin + MARGEN_LIMPIEZA;
                        break;
                    }
                }

                if (!colisiona) {
                    let stringHora12h = convertirMinutosAString12h(minutoPuntero);
                    let objetoFechaBoton = generarObjetoFecha(fechaSeleccionada, minutoPuntero);
                    let esPasada = objetoFechaBoton < ahora;

                    if (!esPasada) {
                        htmlBotones += `
                            <div class="hora-boton-contenedor">
                                <input type="radio" id="dyn-hr-${indexBotones}" name="hora" value="${stringHora12h}" class="hora-radio-oculto" required>
                                <label for="dyn-hr-${indexBotones}" class="hora-boton-label">
                                    ${stringHora12h.replace(" AM", "").replace(" PM", "")} 
                                    <span class="ampm-sub">${stringHora12h.includes("PM") ? "PM" : "AM"}</span>
                                </label>
                            </div>`;
                        indexBotones++;
                    }
                    
                    minutoPuntero += duracionServicioSolicitado + MARGEN_LIMPIEZA;
                }
            }

            if (htmlBotones === "") {
                contenedorHoras.innerHTML = '<div class="texto-alerta" style="grid-column: 1/-1; color: var(--danger-color);">No quedan bloques libres para este servicio hoy.</div>';
            } else {
                contenedorHoras.innerHTML = htmlBotones;
            }

        } catch (err) {
            console.error("Error consultando horarios:", err.message);
            contenedorHoras.innerHTML = '<div class="texto-alerta" style="grid-column: 1/-1; color: var(--danger-color);">Error al sincronizar agenda.</div>';
        }
    }

    if (formulario) {

                const { data: duplicados, error: errorDuplicados } = await _supabase
                    .from('reservas')
                    .select('hora, duracion')
                    .eq('fecha', fecha)
                    .eq('barbero', barbero);

                if (errorDuplicados) throw new Error("Error al comprobar la disponibilidad: " + errorDuplicados.message);

                const inicioNuevaCitaMin = convertirStringAMinutos(hora);
                const finNuevaCitaMin = inicioNuevaCitaMin + duracion;
                let sobreescrito = false;

                if (duplicados) {
                    for (let d of duplicados) {
                        let dInicio = convertirStringAMinutos(d.hora);
                        let dFin = dInicio + (d.duracion || 30);
                        if (inicioNuevaCitaMin < dFin && finNuevaCitaMin > dInicio) {
                            sobreescrito = true;
                            break;
                        }
                    }
                }

                if (sobreescrito) {
                    if (nuevaPestana) nuevaPestana.close();
                    alert("¡Lo sentimos! Ese bloque horario acaba de ser ocupado. Por favor elige otra hora.");
                    actualizarHorariosDisponibles();
                    return;
                }

                // 2. Inserción segura de datos en Supabase
                const { data: nuevaReserva, error: errorInsert } = await _supabase
                    .from('reservas')
                    .insert([{ 
                        fecha: fecha, 
                        hora: hora, 
                        barbero: barbero, 
                        duracion: duracion,
                        cliente: nombre,
                        telefono: telefono,
                        servicio: servicio
                    }])
                    .select();

                if (errorInsert) throw new Error("Supabase rechazó los datos: " + errorInsert.message);
                if (!nuevaReserva || nuevaReserva.length === 0) throw new Error("Se guardó en base de datos pero no se generó el ID de confirmación.");

                localStorage.setItem("barberia_nombre", nombre);
                localStorage.setItem("barberia_telefono", telefono);

                // 3. Sistema de alertas vía EmailJS
                var datosParaCorreo = {
                    nombre_cliente: nombre,
                    telefono: telefono,
                    hora_cita: `${hora} el día ${fecha} con ${barbero}`
                };

                emailjs.send("service_z2lbr3y", "template_7phspmb", datosParaCorreo)
                    .then(function() {
                        console.log("Correo enviado de forma exitosa.");
                    }, function(err) {
                        console.error("EmailJS Error al mandar correo:", err);
                    });

                // 4. Procesado del link de WhatsApp con cancelación automática
                const idGenerado = nuevaReserva[0].id;
                const urlBase = window.location.origin + window.location.pathname;
                const enlaceCancelar = `${urlBase}?cancelar=${idGenerado}`;

                const telefonoBarberia = "18299702130"; 
                const mensaje = `💈 *NUEVA CITA - THE JOSEPH BARBERSHOP* 💈\n\n👤 *Cliente:* ${nombre}\n📞 *Teléfono:* ${telefono}\n✂️ *Servicio:* ${servicio} (${duracion} min)\n🧔 *Barbero:* ${barbero}\n📅 *Fecha:* ${fecha}\n⏰ *Hora:* ${hora}\n\n_¡Por favor confirma mi espacio!_\n\n❌ *Para cancelar o cambiar tu espacio haz clic aquí:* \n${enlaceCancelar}`;
                
                const urlWhatsapp = `https://wa.me/${telefonoBarberia}?text=${encodeURIComponent(mensaje)}`;
                
                if (nuevaPestana) {
                    nuevaPestana.location.href = urlWhatsapp;
                } else {
                    window.open(urlWhatsapp, '_blank');
                }
                
                actualizarHorariosDisponibles();

            } catch (err) {
                if (nuevaPestana) nuevaPestana.close();
                console.error("Error detectado en el submit:", err);
                alert("No se pudo procesar la cita de forma segura. Detalle técnico: " + err.message);
            }
        });
    }
