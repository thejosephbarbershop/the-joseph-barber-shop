<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - The Joseph Barbershop</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #d4af37;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --white: #ffffff;
            --whatsapp-color: #25d366;
            --alert-color: #ff9800;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .admin-container { max-width: 800px; margin: 0 auto; background: var(--white); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        header { background-color: var(--primary-color); color: var(--white); padding: 20px; text-align: center; border-bottom: 4px solid var(--accent-color); }
        header h1 { margin: 0; font-size: 1.5rem; color: var(--accent-color); letter-spacing: 1px; }
        .controls { padding: 20px; background: #eee; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .btn-refresh { background: var(--primary-color); color: var(--white); border: 2px solid var(--accent-color); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-refresh:hover { background: var(--accent-color); color: var(--primary-color); }
        .input-date { padding: 10px; border-radius: 10px; border: 2px solid #ccc; font-size: 1rem; }
        .appointments-list { padding: 20px; }
        .appointment-card { background: #f9f9f9; border: 2px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .appointment-card.urgent { border-color: var(--alert-color); background: #fffbe6; }
        .info-client h3 { margin: 0 0 5px 0; color: var(--primary-color); }
        .info-client p { margin: 3px 0; font-size: 0.9rem; color: #666; }
        .badge-time { background: var(--primary-color); color: var(--accent-color); padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; }
        .btn-remind { background-color: var(--whatsapp-color); color: white; border: none; padding: 12px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 0.9rem; transition: transform 0.2s; }
        .btn-remind:hover { transform: scale(1.03); background-color: #20ba59; }
        .no-data { text-align: center; color: #888; padding: 40px 20px; font-size: 1.1rem; }
        .status-tag { font-size: 0.8rem; font-weight: bold; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .tag-waiting { background: #ffe0b2; color: #f57c00; }
        .tag-now { background: #c8e6c9; color: #388e3c; }
    </style>
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>PANEL DE ADMINISTRACIÓN</h1>
            <p style="margin: 5px 0 0 0; opacity: 0.8; font-size: 0.9rem;">Monitoreo y Recordatorios de Citas</p>
        </header>
        <div class="controls">
            <label><b>Ver citas del día:</b></label>
            <input type="date" id="filtro-fecha" class="input-date">
            <button id="btn-cargar" class="btn-refresh">🔄 Actualizar Lista</button>
        </div>
        <div id="lista-citas" class="appointments-list">
            <div class="no-data">Conectando con la barbería...</div>
        </div>
    </div>

<script>
window.onload = function() {
    const SUPABASE_URL = "https://xnfmqumhhxpkrigizvlu.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhuZm1xdW1oaHhwa3JpZ2l6dmx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTE3NjgsImV4cCI6MjA5NTQ4Nzc2OH0.zNSZ4Nw2Iz2IieExt9SErJddPseWb65Hxedg5ZGZCvI";
    
    const miSupabase = window.supabase || (typeof supabase !== 'undefined' ? supabase : null);

    if (!miSupabase) {
        document.getElementById('lista-citas').innerHTML = '<div class="no-data" style="color: red;">❌ Error de conexión interna.</div>';
        return;
    }

    window._supabase = miSupabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const selectorFecha = document.getElementById('filtro-fecha');
    const btnCargar = document.getElementById('btn-cargar');
    const listaCitas = document.getElementById('lista-citas');

    let notificacionesEnviadas = new Set();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker listo para enviar alertas'))
            .catch(err => console.error('Error al registrar Service Worker:', err));
    }

    if ("Notification" in window) {
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    const hoy = new Date();
    const offset = hoy.getTimezoneOffset();
    const hoyLocal = new Date(hoy.getTime() - (offset*60*1000));
    selectorFecha.value = hoyLocal.toISOString().split('T')[0];

    function horaAMinutos(horaStr) {
        if (!horaStr) return 0;
        let [time, modifier] = horaStr.split(' ');
        let [hours, minutes] = time.split(':').map(Number);
        if (hours === 12 && modifier === 'AM') hours = 0;
        if (modifier === 'PM' && hours !== 12) hours += 12;
        return (hours * 60) + minutes;
    }

    function lanzarNotificacionPush(titulo, mensaje) {
        if ("Notification" in window && Notification.permission === "granted") {
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'NOTIFY',
                    title: titulo,
                    body: mensaje
                });
            } else {
                new Notification(titulo, { body: mensaje });
            }
            
            if ("vibrate" in navigator) {
                navigator.vibrate([200, 100, 200]);
            }
        }
    }

    window.cargarAgenda = async function() {
        const fechaSeleccionada = selectorFecha.value;
        if (!fechaSeleccionada) return;
        
        listaCitas.innerHTML = '<div class="no-data">🔍 Buscando citas en tiempo real...</div>';
        
        try {
            const { data: reservas, error } = await window._supabase
                .from('reservas')
                .select('*')
                .eq('fecha', fechaSeleccionada);

            if (error) throw error;

            if (!reservas || reservas.length === 0) {
                listaCitas.innerHTML = '<div class="no-data">📭 No hay citas agendadas para esta fecha.</div>';
                return;
            }

            reservas.sort((a, b) => horaAMinutos(a.hora) - horaAMinutos(b.hora));
            let htmlContenido = "";
            
            const ahora = new Date();
            const minutesActuales = (ahora.getHours() * 60) + ahora.getMinutes();
            const esHoy = fechaSeleccionada === ahora.toISOString().split('T')[0];

            reservas.forEach(cita => {
                const minCita = horaAMinutos(cita.hora);
                const diferencia = minCita - minutesActuales;
                
                let esUrgente = esHoy && (diferencia <= 10 && diferencia >= -30);
                let claseUrgent = esUrgente ? "urgent" : "";
                let estadoTag = "";
                
                if (esHoy) {
                    if (diferencia > 10) { 
                        estadoTag = `<span class="status-tag tag-waiting">Faltan ${diferencia} min</span>`; 
                    } else if (diferencia <= 10 && diferencia >= -30) { 
                        estadoTag = `<span class="status-tag tag-now">⏰ Toca Ahora / Pronto</span>`; 
                        
                        const idNotificacion = `${cita.id}-${cita.hora}`;
                        if (diferencia > 0 && diferencia <= 10 && !notificacionesEnviadas.has(idNotificacion)) {
                            lanzarNotificacionPush(
                                `💈 Próxima Cita en ${diferencia} min`,
                                `Cliente: ${cita.cliente} \nServicio: ${cita.servicio} a las ${cita.hora}.`
                            );
                            notificacionesEnviadas.add(idNotificacion);
                        }
                    }
                }

                const mensajeRecordatorio = `¡Hola ${cita.cliente}! 🔥 Te saluda Joseph de The Joseph Barbershop. Pasaba a recordarte que tu espacio para hoy de *${cita.servicio}* está reservado para las *${cita.hora}*. ¡Te esperamos! 💈`;
                let numCliente = cita.telefono ? cita.telefono.replace(/\D/g, '') : "";
                if (numCliente.length === 10 && !numCliente.startsWith('1')) { numCliente = '1' + numCliente; }
                const urlWhatsapp = `https://wa.me/${numCliente}?text=${encodeURIComponent(mensajeRecordatorio)}`;

                htmlContenido += `
                    <div class="appointment-card ${claseUrgent}">
                        <div class="info-client">
                            <h3>${cita.cliente || "Cliente sin nombre"}</h3>
                            <p><strong>📞 Teléfono:</strong> ${cita.telefono || "No registrado"}</p>
                            <p><strong>✂️ Servicio:</strong> ${cita.servicio || "No especificado"}</p>
                            <div style="margin-top: 8px;">${estadoTag}</div>
                        </div>
                        <div style="text-align: right; display: flex; flex-direction: column; gap: 10px; align-items: flex-end;">
                            <span class="badge-time">${cita.hora}</span>
                            <a href="${urlWhatsapp}" target="_blank" class="btn-remind">💬 Recordar</a>
                            <button onclick="eliminarReserva('${cita.id}')" style="background-color: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin-left: 10px;">❌ Cancelar</button>
                        </div>
                    </div>`;
            });
            listaCitas.innerHTML = htmlContenido;
        } catch (err) {
            console.error(err);
            listaCitas.innerHTML = '<div class="no-data" style="color: red;">❌ Error al conectar.</div>';
        }
    }

    btnCargar.addEventListener('click', window.cargarAgenda);
    selectorFecha.addEventListener('change', window.cargarAgenda);
    
    window.cargarAgenda();

    setInterval(() => {
        const ahora = new Date();
        const esHoy = selectorFecha.value === ahora.toISOString().split('T')[0];
        if (esHoy) {
            window.cargarAgenda();
        }
    }, 60000); 

    // ========================================================
    // ESCUCHADOR EN TIEMPO REAL PARA NUEVAS CITAS
    // ========================================================
    window._supabase
        .channel('cambios-reservas')
        .on(
            'postgres_changes', 
            { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'reservas' 
            }, 
            (payload) => {
                const nuevaCita = payload.new;
                
                // 1. Envía la notificación nativa emergente
                lanzarNotificacionPush(
                    `🆕 ¡Nueva Reserva Agendada!`,
                    `Cliente: ${nuevaCita.cliente || 'Sin nombre'}\nServicio: ${nuevaCita.servicio || 'No especificado'}\nHora: ${nuevaCita.hora}`
                );
                
                // 2. Si el panel está mostrando el día de esa cita, refresca la lista solo
                if (selectorFecha.value === nuevaCita.fecha) {
                    window.cargarAgenda();
                }
            }
        )
        .subscribe();
};

window.eliminarReserva = async function(idReserva) {
    const confirmar = confirm("¿Estás seguro de que deseas cancelar esta reserva?");
    if (!confirmar) return;

    try {
        const { error } = await window._supabase
            .from('reservas')
            .delete()
            .eq('id', idReserva);

        if (error) throw error;

        alert("Reserva cancelada con éxito.");
        window.cargarAgenda(); 

    } catch (error) {
        console.error("Error al cancelar:", error);
        alert("No se pudo cancelar la reserva.");
    }
}   
</script>
</body>
</html>
